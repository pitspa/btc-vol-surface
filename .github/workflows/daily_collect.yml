name: Daily BTC Vol Surface Collection

on:
  schedule:
    # Runs daily at 16:00 UTC
    - cron: '0 16 * * *'

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection script
        run: python scripts/collect.py

      - name: Run FIFO cleanup
        run: python scripts/cleanup.py

      - name: Remove .gitkeep if surfaces exist
        run: |
          CSV_COUNT=$(find surfaces/ -name "*.csv" | wc -l)
          if [ "$CSV_COUNT" -gt 0 ] && [ -f surfaces/.gitkeep ]; then
            rm surfaces/.gitkeep
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add surfaces/
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "data: BTC vol surface snapshot ${DATE}"
            git push
          fi
